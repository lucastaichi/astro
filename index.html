<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmos — Mapa Astral</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&family=Noto+Sans+Symbols:wght@400&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a84c; --gold-dim: #8a6b28; --gold-pale: #e8d5a0;
  --ink: #0d0b08; --text-faint: #9e8c6e; --text-mid: #c4a96a;
  --line: rgba(201,168,76,0.22); --line-s: rgba(201,168,76,0.5);
  --header-h: 52px; --timenav-h: 44px;
  --sidebar-w: 272px; --info-w: 252px;
  --sheet-h: 52vh;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Crimson Pro',serif; background:var(--ink); color:#e8d5a0; min-height:100vh; overflow:hidden; }

/* ══════════════════════════════════════════
   HEADER
══════════════════════════════════════════ */
.site-header {
  height:var(--header-h); background:#0a0806; border-bottom:1px solid var(--line);
  display:flex; align-items:center; justify-content:space-between; padding:0 1.5rem;
  flex-shrink:0; position:relative; z-index:40;
}
.logo { font-family:'Cinzel',serif; font-size:1.1rem; color:var(--gold); letter-spacing:0.18em; }
.logo small { font-family:'Crimson Pro',serif; font-size:0.6rem; color:var(--text-faint); font-style:italic; letter-spacing:0.25em; display:block; margin-top:1px; }
.tab-nav { display:flex; }
.tab-btn {
  font-family:'Cinzel',serif; font-size:0.62rem; letter-spacing:0.14em;
  padding:0.42rem 1rem; background:transparent; border:1px solid rgba(201,168,76,0.2);
  color:var(--text-faint); cursor:pointer; transition:all 0.18s; text-transform:uppercase;
}
.tab-btn+.tab-btn { border-left:none; }
.tab-btn:first-child { border-radius:3px 0 0 3px; }
.tab-btn:last-child  { border-radius:0 3px 3px 0; }
.tab-btn.active  { background:var(--gold); color:#0a0806; border-color:var(--gold); }
.tab-btn:not(.active):hover { color:var(--gold); border-color:var(--line-s); }

/* Mobile hamburger / panel toggles — hidden on desktop */
.mob-toggle {
  display:none; background:transparent; border:1px solid var(--line);
  color:var(--text-faint); font-size:1rem; width:36px; height:36px;
  border-radius:4px; cursor:pointer; align-items:center; justify-content:center;
  transition:all 0.15s; flex-shrink:0;
}
.mob-toggle:active { background:rgba(201,168,76,0.12); color:var(--gold); }

/* ══════════════════════════════════════════
   TIME NAVIGATOR
══════════════════════════════════════════ */
.time-nav {
  height:var(--timenav-h); background:#0c0a07; border-bottom:1px solid var(--line);
  display:flex; align-items:center; justify-content:center; gap:0; flex-shrink:0;
  overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none;
}
.time-nav::-webkit-scrollbar { display:none; }
.time-display {
  font-family:'Cinzel',serif; font-size:0.78rem; color:var(--gold);
  letter-spacing:0.1em; padding:0 1.4rem; min-width:200px; text-align:center;
  white-space:nowrap;
}
.time-display span { font-family:'Crimson Pro',serif; font-size:0.65rem; color:var(--text-faint); font-style:italic; display:block; letter-spacing:0.05em; margin-top:1px; }
.nav-group { display:flex; gap:0; align-items:center; flex-shrink:0; }
.nav-label { font-family:'Crimson Pro',serif; font-size:0.6rem; color:var(--text-faint); font-style:italic; letter-spacing:0.1em; padding:0 0.5rem; text-transform:uppercase; }
.nav-btn {
  width:30px; height:30px; background:transparent;
  border:1px solid rgba(201,168,76,0.18); color:var(--text-faint);
  cursor:pointer; font-size:0.7rem; transition:all 0.15s;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.nav-btn+.nav-btn { border-left:none; }
.nav-btn:first-child { border-radius:3px 0 0 3px; }
.nav-btn:last-child  { border-radius:0 3px 3px 0; }
.nav-btn:hover { background:rgba(201,168,76,0.12); color:var(--gold); border-color:var(--line-s); }
.nav-btn:active { background:rgba(201,168,76,0.2); }
.nav-sep { width:1px; height:24px; background:var(--line); margin:0 0.5rem; flex-shrink:0; }
.now-btn {
  font-family:'Cinzel',serif; font-size:0.55rem; letter-spacing:0.12em;
  padding:0.3rem 0.8rem; background:transparent; border:1px solid var(--line-s);
  color:var(--gold); cursor:pointer; border-radius:3px; text-transform:uppercase;
  transition:all 0.15s; margin-left:0.6rem; flex-shrink:0; white-space:nowrap;
}
.now-btn:hover { background:rgba(201,168,76,0.12); }
/* nav btn groups spacing */
.nav-group:not(:first-child) { margin-left:4px; }

/* ══════════════════════════════════════════
   APP LAYOUT — desktop 3-column
══════════════════════════════════════════ */
.app {
  display:flex;
  height:calc(100vh - var(--header-h) - var(--timenav-h));
  position:relative; overflow:hidden;
}
.sidebar {
  width:var(--sidebar-w); min-width:var(--sidebar-w); background:#0f0d09;
  border-right:1px solid var(--line); overflow-y:auto; padding:1.2rem;
  flex-shrink:0; transition:transform 0.28s cubic-bezier(.4,0,.2,1);
  z-index:20;
}
.chart-area {
  flex:1; background:var(--ink); display:flex; flex-direction:column;
  align-items:center; justify-content:center; overflow:hidden; position:relative;
  min-width:0;
}
.info-panel {
  width:var(--info-w); min-width:var(--info-w); background:#0f0d09;
  border-left:1px solid var(--line); overflow-y:auto; padding:1.2rem;
  flex-shrink:0; transition:transform 0.28s cubic-bezier(.4,0,.2,1);
  z-index:20;
}

/* ── Overlay (mobile/tablet backdrop) ── */
.panel-overlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55);
  z-index:19; backdrop-filter:blur(2px);
}
.panel-overlay.visible { display:block; }

/* ══════════════════════════════════════════
   FORMS
══════════════════════════════════════════ */
.sec { font-family:'Cinzel',serif; font-size:0.56rem; letter-spacing:0.25em; text-transform:uppercase; color:var(--gold); margin-bottom:0.85rem; padding-bottom:0.4rem; border-bottom:1px solid var(--line); }
.fg { margin-bottom:0.75rem; position:relative; }
.fg label { display:block; font-size:0.68rem; color:var(--text-faint); margin-bottom:0.25rem; letter-spacing:0.04em; font-style:italic; }
.fg input,.fg select {
  width:100%; background:rgba(201,168,76,0.05); border:1px solid rgba(201,168,76,0.18);
  color:var(--gold-pale); padding:0.38rem 0.55rem; font-family:'Crimson Pro',serif;
  font-size:0.88rem; border-radius:3px; outline:none; transition:border-color 0.18s;
}
.fg input:focus,.fg select:focus { border-color:var(--gold); }
.fg select option { background:#1a1610; }
.r2 { display:grid; grid-template-columns:1fr 1fr; gap:0.55rem; }
.r3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:0.45rem; }
.sep { height:1px; background:var(--line); margin:1rem 0; }
.calc-btn {
  width:100%; padding:0.62rem; background:linear-gradient(135deg,#7a5e22,#c9a84c);
  color:#0a0806; border:none; font-family:'Cinzel',serif; font-size:0.6rem;
  letter-spacing:0.18em; text-transform:uppercase; cursor:pointer; border-radius:3px;
  margin-top:0.4rem; transition:opacity 0.18s;
}
.calc-btn:hover { opacity:0.85; }

/* ══════════════════════════════════════════
   LOCATION SEARCH
══════════════════════════════════════════ */
.loc-wrap { position:relative; }
.loc-suggestions {
  position:absolute; top:calc(100% + 2px); left:0; right:0; z-index:200;
  background:#1a1610; border:1px solid var(--line-s); border-radius:3px;
  max-height:180px; overflow-y:auto; display:none;
}
.loc-suggestions.open { display:block; }
.loc-item {
  padding:0.4rem 0.6rem; font-size:0.82rem; color:var(--gold-pale);
  cursor:pointer; border-bottom:1px solid rgba(201,168,76,0.08);
  transition:background 0.12s;
}
.loc-item:hover,.loc-item:active { background:rgba(201,168,76,0.1); }
.loc-item small { display:block; font-size:0.68rem; color:var(--text-faint); font-style:italic; }
.loc-coords { font-size:0.7rem; color:var(--text-faint); font-style:italic; margin-top:0.2rem; }
.tz-resolving { color:var(--gold-dim); animation:pulse 1.2s infinite; }
.tz-ok  { color:#66bb6a; }
.tz-err { color:#ef9a9a; }

/* ══════════════════════════════════════════
   INFO PANEL CONTENT
══════════════════════════════════════════ */
.planet-row { display:flex; align-items:center; gap:0.5rem; padding:0.3rem 0; border-bottom:1px solid rgba(201,168,76,0.07); font-size:0.82rem; }
.pg { width:20px; text-align:center; font-size:0.95rem; }
.pn { color:var(--text-faint); font-size:0.7rem; min-width:50px; font-style:italic; }
.pp { color:var(--gold-pale); font-size:0.82rem; flex:1; }
.ph { color:var(--text-faint); font-size:0.68rem; }
.pr { color:#c0392b; font-size:0.6rem; }

.aspect-row { display:grid; grid-template-columns:22px 1fr 22px 36px; align-items:center; gap:0.3rem; padding:0.28rem 0; border-bottom:1px solid rgba(201,168,76,0.07); font-size:0.8rem; }
.asp-orb { font-size:0.65rem; color:var(--gold-dim); }

.house-row { display:flex; align-items:center; gap:0.45rem; padding:0.25rem 0; border-bottom:1px solid rgba(201,168,76,0.07); font-size:0.8rem; }
.hn { color:var(--gold); font-family:'Cinzel',serif; font-size:0.6rem; min-width:28px; }
.hc { color:var(--gold-pale); flex:1; }
.hs { color:var(--text-faint); font-size:0.7rem; font-style:italic; }

/* ══════════════════════════════════════════
   STATUS BAR
══════════════════════════════════════════ */
.status-bar {
  position:absolute; bottom:4rem; left:50%; transform:translateX(-50%);
  background:rgba(13,11,8,0.94); border:1px solid rgba(201,168,76,0.3);
  color:var(--gold-pale); padding:0.35rem 1rem; border-radius:20px;
  font-size:0.74rem; font-style:italic; pointer-events:none; opacity:0;
  transition:opacity 0.3s; white-space:nowrap; z-index:6;
}
.status-bar.show { opacity:1; }

/* ══════════════════════════════════════════
   TABS
══════════════════════════════════════════ */
.tab-content { display:none; }
.tab-content.active { display:block; }

/* ══════════════════════════════════════════
   COMPAT SCORE
══════════════════════════════════════════ */
.compat-score { text-align:center; padding:0.8rem; background:rgba(201,168,76,0.05); border:1px solid rgba(201,168,76,0.18); border-radius:5px; margin-bottom:0.8rem; }
.compat-num { font-family:'Cinzel',serif; font-size:2.2rem; color:var(--gold); }
.compat-lbl { font-size:0.65rem; color:var(--text-faint); font-style:italic; }

/* ══════════════════════════════════════════
   LOADING
══════════════════════════════════════════ */
.loading-overlay {
  position:absolute; inset:0; background:var(--ink);
  display:flex; align-items:center; justify-content:center; flex-direction:column; gap:0.8rem; z-index:10;
}
.loading-text { font-family:'Cinzel',serif; font-size:0.65rem; letter-spacing:0.3em; color:var(--gold); text-transform:uppercase; animation:pulse 2s infinite; }
.loading-spinner { width:36px; height:36px; border:1px solid rgba(201,168,76,0.2); border-top-color:var(--gold); border-radius:50%; animation:spin 1.4s linear infinite; }
@keyframes pulse { 0%,100%{opacity:0.35} 50%{opacity:1} }
@keyframes spin { to{transform:rotate(360deg)} }

.empty { text-align:center; color:var(--text-faint); font-style:italic; font-size:0.8rem; padding:1.5rem 0; }

/* ── SIGN GLYPHS ── */
.pp, .hs, .hc { font-family: 'Noto Sans Symbols', 'Crimson Pro', serif; }
::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(201,168,76,0.25); border-radius:2px; }

/* ══════════════════════════════════════════
   CHART CONTROLS
══════════════════════════════════════════ */
.chart-controls {
  position:absolute; bottom:1.2rem; left:50%; transform:translateX(-50%);
  display:flex; gap:0; z-index:5; align-items:center;
}
.ctrl-btn {
  font-family:'Cinzel',serif; font-size:0.52rem; letter-spacing:0.11em;
  padding:0.32rem 0.75rem; background:rgba(13,11,8,0.88);
  border:1px solid rgba(201,168,76,0.25); color:var(--text-faint);
  cursor:pointer; transition:all 0.18s; text-transform:uppercase;
  display:flex; align-items:center; gap:0.35rem; white-space:nowrap;
  backdrop-filter:blur(4px);
}
.ctrl-btn+.ctrl-btn { border-left:none; }
.ctrl-btn:first-child { border-radius:20px 0 0 20px; }
.ctrl-btn:last-child  { border-radius:0 20px 20px 0; }
.ctrl-btn.on  { color:var(--gold); border-color:rgba(201,168,76,0.5); background:rgba(201,168,76,0.1); }
.ctrl-btn.on .ctrl-dot { background:var(--gold); }
.ctrl-btn:not(.on):hover { color:var(--gold-pale); border-color:rgba(201,168,76,0.35); }
.ctrl-dot {
  width:5px; height:5px; border-radius:50%; flex-shrink:0;
  background:rgba(201,168,76,0.3); transition:background 0.18s;
}

/* ══════════════════════════════════════════
   PLANET TOOLTIP (desktop hover)
══════════════════════════════════════════ */
#planet-tooltip {
  position:fixed; z-index:999; pointer-events:none;
  background:rgba(10,8,5,0.96); border:1px solid rgba(201,168,76,0.4);
  border-radius:6px; padding:0.5rem 0.75rem; min-width:140px;
  display:none; box-shadow:0 4px 20px rgba(0,0,0,0.6);
  backdrop-filter:blur(6px);
}
#planet-tooltip .tt-name { font-family:'Cinzel',serif; font-size:0.68rem; letter-spacing:0.12em; color:var(--gold); margin-bottom:0.3rem; }
#planet-tooltip .tt-pos  { font-size:0.82rem; color:var(--gold-pale); margin-bottom:0.15rem; }
#planet-tooltip .tt-house { font-size:0.72rem; color:var(--text-faint); font-style:italic; }
#planet-tooltip .tt-asp  { margin-top:0.35rem; padding-top:0.35rem; border-top:1px solid rgba(201,168,76,0.15); }
#planet-tooltip .tt-asp-row { font-size:0.72rem; color:var(--text-faint); line-height:1.55; }

/* ── Mobile planet info panel styles moved to #mob-planet-tooltip above ── */

/* ══════════════════════════════════════════
   HIGHLIGHT STATES
══════════════════════════════════════════ */
.aspect-row.highlighted { background:rgba(201,168,76,0.1); border-radius:3px; }
.aspect-row.dimmed { opacity:0.2; transition:opacity 0.15s; }
.planet-row.highlighted { background:rgba(201,168,76,0.08); border-radius:3px; }

/* ══════════════════════════════════════════
   MOBILE BOTTOM NAV BAR  (hidden on desktop)
══════════════════════════════════════════ */
.mob-bar {
  display:none; position:fixed; bottom:0; left:0; right:0; z-index:60;
  background:#0a0806; border-top:1px solid var(--line);
  height:56px; align-items:stretch; flex-shrink:0;
}
.mob-bar-btn {
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:transparent; border:none; color:var(--text-faint);
  font-family:'Cinzel',serif; font-size:0.4rem; letter-spacing:0.08em;
  text-transform:uppercase; cursor:pointer; gap:3px;
  border-right:1px solid var(--line); transition:color 0.15s, background 0.15s;
  padding:0 0.15rem; overflow:hidden; -webkit-tap-highlight-color:transparent;
}
.mob-bar-btn:last-child { border-right:none; }
.mob-bar-btn .mbb-icon { font-size:1.05rem; line-height:1; flex-shrink:0; }
.mob-bar-btn .mbb-label { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; width:100%; text-align:center; }
.mob-bar-btn.active { color:var(--gold); background:rgba(201,168,76,0.07); }
.mob-bar-btn:active  { color:var(--gold); background:rgba(201,168,76,0.12); }

/* ── Settings tray (Opção A — popover above mob-bar) ── */
/* ── Settings tray (above mob-bar) — mobile only ── */
#mob-settings-tray {
  display:none; /* shown only on mobile via media query + .open */
  position:fixed; left:0; right:0; z-index:59;
  background:#0f0d09; border-top:1px solid var(--line-s);
  padding:0.65rem 1rem; flex-direction:row; justify-content:space-around; align-items:center;
  gap:0.5rem; box-shadow:0 -4px 16px rgba(0,0,0,0.5);
}
.tray-ctrl {
  display:flex; flex-direction:column; align-items:center; gap:0.25rem;
  font-family:'Cinzel',serif; font-size:0.48rem; letter-spacing:0.1em;
  text-transform:uppercase; color:var(--text-faint); cursor:pointer;
  padding:0.4rem 0.8rem; border-radius:6px; border:1px solid rgba(201,168,76,0.18);
  background:transparent; transition:all 0.15s; -webkit-tap-highlight-color:transparent;
  flex:1;
}
.tray-ctrl .tray-icon { font-size:1rem; }
.tray-ctrl.on { color:var(--gold); border-color:rgba(201,168,76,0.5); background:rgba(201,168,76,0.08); }
.tray-ctrl.on .ctrl-dot { background:var(--gold); }

/* ── Bottom sheet base — mobile only, hidden globally ── */
.mob-sheet {
  display:none; /* flex only inside @media mobile */
  position:fixed; left:0; right:0; z-index:55;
  background:#0f0d09; border-radius:16px 16px 0 0;
  border-top:1px solid rgba(201,168,76,0.3);
  box-shadow:0 -8px 32px rgba(0,0,0,0.65);
  flex-direction:column;
  max-height:82vh;
}
/* On mobile (set by media query below) sheets become flex + slide in/out */
.mob-sheet-handle {
  width:40px; height:4px; background:rgba(201,168,76,0.28); border-radius:2px;
  margin:0.7rem auto 0; flex-shrink:0;
}
.mob-sheet-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:0.55rem 1rem 0.4rem; flex-shrink:0;
  border-bottom:1px solid var(--line);
}
.mob-sheet-title {
  font-family:'Cinzel',serif; font-size:0.6rem; letter-spacing:0.2em;
  text-transform:uppercase; color:var(--gold);
}
.mob-sheet-close {
  background:transparent; border:none; color:var(--text-faint);
  font-size:1.1rem; cursor:pointer; padding:0.2rem 0.4rem; line-height:1;
  -webkit-tap-highlight-color:transparent;
}
.mob-sheet-reset {
  background:transparent; border:1px solid rgba(201,168,76,0.2);
  color:var(--text-faint); font-size:0.85rem; cursor:pointer;
  padding:0.15rem 0.5rem; border-radius:4px; line-height:1;
  font-family:'Cinzel',serif; letter-spacing:0.05em;
  -webkit-tap-highlight-color:transparent; transition:all 0.15s;
}
.mob-sheet-reset:active { color:var(--gold); border-color:var(--gold); }
.mob-sheet-body {
  overflow-y:auto; -webkit-overflow-scrolling:touch;
  padding:0.9rem 1rem 1rem; flex:1;
}

/* ── Mobile planet tap tooltip — hidden globally, shown on mobile only ── */
#mob-planet-tooltip {
  display:none; /* shown via JS on mobile only */
  position:fixed; z-index:70; pointer-events:auto;
  background:rgba(10,8,5,0.97); border:1px solid rgba(201,168,76,0.4);
  border-radius:10px; padding:0.7rem 0.9rem; min-width:180px; max-width:260px;
  box-shadow:0 6px 24px rgba(0,0,0,0.7); backdrop-filter:blur(8px);
}
#mob-planet-tooltip .mpt-name  { font-family:'Cinzel',serif; font-size:0.75rem; letter-spacing:0.12em; margin-bottom:0.3rem; }
#mob-planet-tooltip .mpt-pos   { font-size:0.88rem; color:var(--gold-pale); margin-bottom:0.12rem; }
#mob-planet-tooltip .mpt-house { font-size:0.72rem; color:var(--text-faint); font-style:italic; }
#mob-planet-tooltip .mpt-asps  { margin-top:0.4rem; padding-top:0.4rem; border-top:1px solid rgba(201,168,76,0.15); display:flex; flex-direction:column; gap:0.18rem; }
#mob-planet-tooltip .mpt-asp-row { font-size:0.72rem; color:var(--text-faint); line-height:1.5; }
#mob-planet-tooltip-close {
  position:absolute; top:0.4rem; right:0.55rem;
  background:transparent; border:none; color:var(--text-faint);
  font-size:0.95rem; cursor:pointer; padding:0.15rem;
  -webkit-tap-highlight-color:transparent;
}

/* ── SVG zoom wrapper — neutral on desktop, touch-enabled on mobile ── */
#chart-zoom-wrap {
  width:100%; height:100%; position:relative;
  /* touch-action and cursor set only on mobile via media query */
}

/* ── Zoom reset button — hidden everywhere, shown on mobile via JS ── */
#btn-zoom-reset {
  display:none;
  position:absolute; top:0.6rem; right:0.6rem; z-index:8;
  background:rgba(13,11,8,0.88); border:1px solid rgba(201,168,76,0.35);
  color:var(--gold-pale); font-family:'Cinzel',serif; font-size:0.5rem;
  letter-spacing:0.1em; text-transform:uppercase; padding:0.3rem 0.65rem;
  border-radius:20px; cursor:pointer; backdrop-filter:blur(4px);
  -webkit-tap-highlight-color:transparent;
}

/* ══════════════════════════════════════════
   TABLET  768–1023px
══════════════════════════════════════════ */
@media (max-width:1023px) {
  :root { --sidebar-w:300px; --info-w:270px; }
  .logo small { display:none; }
  .tab-btn { padding:0.42rem 0.7rem; font-size:0.58rem; letter-spacing:0.1em; }

  /* Sidebar: left drawer */
  .sidebar {
    position:absolute; top:0; left:0; bottom:0;
    transform:translateX(-100%);
    box-shadow:4px 0 24px rgba(0,0,0,0.5);
    z-index:25;
  }
  .sidebar.open { transform:translateX(0); }

  /* Info panel: right drawer */
  .info-panel {
    position:absolute; top:0; right:0; bottom:0;
    transform:translateX(100%);
    box-shadow:-4px 0 24px rgba(0,0,0,0.5);
    z-index:25;
  }
  .info-panel.open { transform:translateX(0); }

  /* Overlay sits between chart and drawers */
  .panel-overlay { z-index:24; }

  /* Right-side duplicate nav groups hidden on tablet */
  .time-nav-right { display:none; }
  .hide-mob       { display:none !important; }

  .status-bar { bottom:4.5rem; }
}

/* ══════════════════════════════════════════
   MOBILE  ≤767px  — full redesign
══════════════════════════════════════════ */
@media (max-width:767px) {
  :root { --header-h:48px; --timenav-h:38px; --mob-bar-h:56px; }

  body { overflow:hidden; }

  /* ── Header: hide desktop tab-nav, keep logo + time ── */
  .site-header { padding:0 0.8rem; }
  .logo { font-size:0.88rem; letter-spacing:0.1em; }
  .logo small { display:none; }
  .tab-nav { display:none; }

  /* ── Time nav: scrollable, no justify-content:space-between conflict ── */
  .time-nav {
    height:var(--timenav-h); padding:0 0.4rem;
    justify-content:flex-start; overflow-x:auto;
    gap:0; scrollbar-width:none;
  }
  .time-nav::-webkit-scrollbar { display:none; }
  /* Remove conflicting justify, let items flow naturally with scroll */
  .time-display { font-size:0.62rem; min-width:140px; padding:0 0.6rem; letter-spacing:0.03em; flex-shrink:0; }
  .time-display span { font-size:0.52rem; }
  .nav-btn { width:28px; height:28px; font-size:0.65rem; }
  .nav-sep { margin:0 0.25rem; }
  .now-btn { font-size:0.5rem; padding:0.25rem 0.6rem; margin-left:0.4rem; }

  /* Hide duplicate right-side groups AND year groups on mobile */
  .time-nav-right { display:none !important; }
  .hide-mob       { display:none !important; }

  /* ── App: fills space between timenav and mob-bar ── */
  .app {
    height:calc(100vh - var(--header-h) - var(--timenav-h) - var(--mob-bar-h));
    min-height:260px;
  }

  /* ── Desktop sidebar/info: hidden on mobile (replaced by mob-sheets) ── */
  .sidebar, .info-panel { display:none !important; }

  /* ── Chart area: full width, no min-width constraint ── */
  .chart-area { min-width:0; }

  /* ── Chart controls: hidden on mobile (moved to settings tray) ── */
  .chart-controls { display:none; }

  /* ── Desktop tooltip: never show on mobile ── */
  #planet-tooltip { display:none !important; }

  /* ── Status bar: above mob-bar ── */
  .status-bar { bottom:calc(var(--mob-bar-h) + 0.6rem); font-size:0.68rem; }

  /* ── Bottom bar: visible ── */
  .mob-bar { display:flex; }

  /* ── Panel overlay: covers chart area only (above timenav, below mob-bar) ── */
  .panel-overlay {
    top:calc(var(--header-h) + var(--timenav-h));
    bottom:var(--mob-bar-h);
    z-index:54;
  }

  /* ── Touch targets ── */
  .fg input, .fg select { font-size:1rem; padding:0.5rem 0.6rem; min-height:44px; }
  .calc-btn { font-size:0.62rem; padding:0.75rem; min-height:44px; }
  .loc-item { padding:0.55rem 0.7rem; font-size:0.9rem; min-height:44px; display:flex; align-items:center; flex-wrap:wrap; }
  .loc-suggestions { max-height:200px; }

  /* ── Activate mob-sheets on mobile ── */
  .mob-sheet {
    display:flex; /* now a flex column, out of view by default via transform */
    bottom:var(--mob-bar-h);
    transform:translateY(110%);
    transition:transform 0.3s cubic-bezier(.4,0,.2,1);
  }
  .mob-sheet.open { transform:translateY(0); }

  /* ── Settings tray: position and activate on mobile ── */
  #mob-settings-tray {
    bottom:var(--mob-bar-h);
  }
  #mob-settings-tray.open { display:flex; }

  /* ── Mobile planet tooltip: shown via JS ── */
  #mob-planet-tooltip.visible { display:block; }

  /* ── Zoom wrap: enable touch gestures only on mobile ── */
  #chart-zoom-wrap {
    touch-action:none;
    cursor:grab;
  }
  #chart-zoom-wrap:active { cursor:grabbing; }

  /* ── Zoom reset button ── */
  #btn-zoom-reset.visible { display:block; }
}

/* ══════════════════════════════════════════

}

<script src="https://cdn.jsdelivr.net/npm/luxon@3/build/global/luxon.min.js"></script>
<script type="module">
import SwissEph from 'https://cdn.jsdelivr.net/gh/prolaxu/swisseph-wasm@main/src/swisseph.js';

// ── State ────────────────────────────────────────────────────────────────────
let swe = null;
let currentTab = 'live';
let navDate = new Date(); // controlled by time navigator
let liveLocation = { lat: -19.9245, lng: -43.9352, tz: -3, ianaZone: 'America/Sao_Paulo', name: 'Belo Horizonte, BR' };

// ── Luxon timezone resolver (sem API externa, sem chave) ─────────────────────
// Estratégia:
//   1. Nominatim retorna extratags.timezone (IANA) quando disponível — usar direto.
//   2. Se não disponível, usar geoTzGuess() — mapeamento compacto lat/lng → IANA.
//   3. Luxon converte hora local → UTC com DST histórico correto para qualquer data.
//
// Teste: 15/05/1990 14:30 America/Sao_Paulo
//   luxon: DateTime.fromISO('1990-05-15T14:30', {zone:'America/Sao_Paulo'}).toUTC()
//   → 1990-05-15T17:30:00.000Z  (UTC-3, horário padrão — sem DST em maio)
//
//   15/12/1990 14:30 America/Sao_Paulo (horário de verão ativo → UTC-2)
//   luxon: DateTime.fromISO('1990-12-15T14:30', {zone:'America/Sao_Paulo'}).toUTC()
//   → 1990-12-15T16:30:00.000Z  (UTC-2 correto com DST)

const { DateTime } = luxon;

// Converte data local (string 'yyyy-MM-dd') + hora + minuto + IANA zone → JD UTC
// Retorna null e exibe erro se a zona/data for inválida.
function localToJD(dateStr, hour, min, ianaZone) {
  if (!dateStr) return null;
  const iso = `${dateStr}T${String(hour).padStart(2,'0')}:${String(min).padStart(2,'0')}`;
  const dt = DateTime.fromISO(iso, { zone: ianaZone });
  if (!dt.isValid) {
    console.warn(`Cosmos: data/fuso inválido — "${iso}" zone="${ianaZone}" reason="${dt.invalidReason}"`);
    return null;
  }
  const utc = dt.toUTC();
  return swe.julday(utc.year, utc.month, utc.day, utc.hour + utc.minute / 60);
}

// Formata o offset UTC atual de uma zona IANA numa data específica (ex: "UTC-3", "UTC+5:30")
function fmtZoneOffset(ianaZone, dateStr) {
  try {
    const dt = DateTime.fromISO(`${dateStr}T12:00`, { zone: ianaZone });
    if (!dt.isValid) return ianaZone;
    const off = dt.offset; // minutos
    const sign = off >= 0 ? '+' : '-';
    const abs = Math.abs(off);
    const h = Math.floor(abs / 60);
    const m = abs % 60;
    return m ? `UTC${sign}${h}:${String(m).padStart(2,'0')}` : `UTC${sign}${h}`;
  } catch { return ianaZone; }
}

// Tenta extrair timezone IANA da resposta Nominatim (via extratags) ou faz fallback
// para a tabela de país. Nominatim retorna extratags.timezone quando disponível.
function ianaFromNominatim(result) {
  // Preferência 1: extratags.timezone (Nominatim retorna quando disponível)
  const et = result.extratags?.timezone || result.extratags?.['timezone:iana'];
  if (et && isValidIANA(et)) return et;
  // Preferência 2: tabela compacta por country_code
  const cc = (result.address?.country_code || '').toUpperCase();
  if (COUNTRY_TZ[cc]) return COUNTRY_TZ[cc];
  // Fallback: estimativa geográfica convertida para zona fixa Etc/GMT±N
  // (sem DST, mas melhor que nada para países não mapeados)
  const lng = parseFloat(result.lon);
  const offsetH = -Math.round(lng / 15); // Etc/GMT usa sinal invertido
  const sign = offsetH <= 0 ? '+' : '-'; // Etc/GMT+3 = UTC-3
  return `Etc/GMT${sign}${Math.abs(offsetH)}`;
}

function isValidIANA(zone) {
  try {
    return DateTime.now().setZone(zone).isValid;
  } catch { return false; }
}

// ── Auto-detect geolocation ───────────────────────────────────────────────────
async function autoDetectLocation() {
  if (!navigator.geolocation) return;
  const coordEl = document.getElementById('live-coords');
  const locEl   = document.getElementById('live-loc');
  // Show resolving indicator (small, non-intrusive)
  if (coordEl) coordEl.innerHTML = '<span class="tz-resolving">⊙ Detectando localização…</span>';
  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      const { latitude: lat, longitude: lng } = pos.coords;
      try {
        const url = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&addressdetails=1&extratags=1`;
        const res  = await fetch(url, { headers: { 'Accept-Language': 'pt-BR,pt,en' } });
        const data = await res.json();
        const ianaZone = ianaFromNominatim(data);
        const city     = data.address?.city || data.address?.town || data.address?.village || data.address?.county || data.name || '';
        const country  = (data.address?.country_code || '').toUpperCase();
        const state    = data.address?.state || '';
        const label    = [city, state, country].filter(Boolean).join(', ');
        // Update hidden fields + live state
        document.getElementById('live-lat').value = lat;
        document.getElementById('live-lng').value = lng;
        document.getElementById('live-tz').value  = ianaZone;
        if (locEl) locEl.value = label;
        const today = new Date().toISOString().slice(0,10);
        const dt    = DateTime.fromISO(`${today}T12:00`, { zone: ianaZone });
        const tzNum = dt.isValid ? dt.offset / 60 : Math.round(lng / 15);
        liveLocation = { lat, lng, tz: tzNum, ianaZone, name: label };
        // Update coords display
        const offsetLabel = fmtZoneOffset(ianaZone, today);
        if (coordEl) coordEl.innerHTML = `${lat.toFixed(4)}, ${lng.toFixed(4)} · ${offsetLabel} <span class="tz-ok">✓ ${ianaZone}</span>`;
        // Sync time fields to current local time
        const now = new Date();
        document.getElementById('live-hour').value = now.getHours();
        document.getElementById('live-min').value  = now.getMinutes();
        updateTimeDisplay();
        renderLiveChart();
      } catch(e) {
        if (coordEl) coordEl.innerHTML = '<span class="tz-err">⚠ Localização detectada, cidade não identificada</span>';
      }
    },
    () => {
      // Permission denied or unavailable — clear the indicator silently
      if (coordEl) {
        const today = new Date().toISOString().slice(0,10);
        const offsetLabel = fmtZoneOffset(liveLocation.ianaZone, today);
        coordEl.innerHTML = `${liveLocation.lat.toFixed(4)}, ${liveLocation.lng.toFixed(4)} · ${offsetLabel} <span class="tz-ok">✓ ${liveLocation.ianaZone}</span>`;
      }
    },
    { timeout: 8000, maximumAge: 300000 }
  );
}

function initDateFields() {
  const now = new Date();
  const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  document.getElementById('live-date').value = fmt(now);
  document.getElementById('live-hour').value = now.getHours();
  document.getElementById('live-min').value  = now.getMinutes();
  document.getElementById('t-date').value    = fmt(now);
  document.getElementById('live-loc').value  = liveLocation.name;
  const today = fmt(now);
  const offsetLabel = fmtZoneOffset(liveLocation.ianaZone, today);
  document.getElementById('live-coords').innerHTML =
    `${liveLocation.lat.toFixed(4)}, ${liveLocation.lng.toFixed(4)} · ${offsetLabel} <span class="tz-ok">✓ ${liveLocation.ianaZone}</span>`;
}

// ── Time Navigator ────────────────────────────────────────────────────────────
window.shiftTime = function(delta, unit) {
  const d = new Date(navDate);
  if (unit === 'h') d.setHours(d.getHours() + delta);
  if (unit === 'd') d.setDate(d.getDate() + delta);
  if (unit === 'm') d.setMonth(d.getMonth() + delta);
  if (unit === 'y') d.setFullYear(d.getFullYear() + delta);
  navDate = d;
  updateTimeDisplay();
  syncDateFields();
  if (currentTab === 'live') renderLiveChart();
  else if (currentTab === 'natal') calcNatal();
  else if (currentTab === 'transits') calcTransits();
};

window.goNow = function() {
  navDate = new Date();
  updateTimeDisplay();
  syncDateFields();
  if (currentTab === 'live') renderLiveChart();
};

function syncDateFields() {
  const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  document.getElementById('live-date').value = fmt(navDate);
  document.getElementById('live-hour').value = navDate.getHours();
  document.getElementById('live-min').value  = navDate.getMinutes();
}

function updateTimeDisplay() {
  const d = navDate;
  const pad = n => String(n).padStart(2,'0');
  const dateStr = `${pad(d.getDate())} ${MONTH_PT[d.getMonth()]} ${d.getFullYear()}`;
  const timeStr = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
  const tz = liveLocation.tz;
  document.getElementById('time-display').innerHTML =
    `${dateStr} · ${timeStr}<span>UTC${tz >= 0 ? '+' : ''}${tz} · ${liveLocation.name}</span>`;
}

// ── Location search (Nominatim/OSM) ───────────────────────────────────────────
let searchTimers = {};
window.searchLocation = function(query, prefix) {
  clearTimeout(searchTimers[prefix]);
  const sugEl = document.getElementById(prefix+'-suggestions');
  if (query.length < 3) { sugEl.classList.remove('open'); return; }
  searchTimers[prefix] = setTimeout(async () => {
    try {
      const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=6&featuretype=city&addressdetails=1`;
      const res = await fetch(url, { headers: { 'Accept-Language': 'pt-BR,pt,en' } });
      const data = await res.json();
      renderSuggestions(data, prefix);
    } catch(e) { sugEl.classList.remove('open'); }
  }, 320);
};

function renderSuggestions(results, prefix) {
  const el = document.getElementById(prefix+'-suggestions');
  el.innerHTML = '';
  if (!results.length) { el.classList.remove('open'); return; }
  for (const r of results) {
    const lat   = parseFloat(r.lat);
    const lng   = parseFloat(r.lon);
    const iana  = ianaFromNominatim(r);   // resolve IANA zone from Nominatim data
    const city  = r.address?.city || r.address?.town || r.address?.village || r.name;
    const country = r.address?.country_code?.toUpperCase() || '';
    const state   = r.address?.state || '';
    const label   = [city, state, country].filter(Boolean).join(', ');
    const div = document.createElement('div');
    div.className = 'loc-item';
    div.innerHTML = `${city || r.name}<small>${state ? state+', ' : ''}${country}</small>`;
    div.onclick = () => selectLocation(prefix, lat, lng, iana, label);
    el.appendChild(div);
  }
  el.classList.add('open');
}

function selectLocation(prefix, lat, lng, ianaZone, label) {
  document.getElementById(prefix+'-lat').value  = lat;
  document.getElementById(prefix+'-lng').value  = lng;
  document.getElementById(prefix+'-tz').value   = ianaZone;   // store IANA zone string
  document.getElementById(prefix+'-loc').value  = label;
  document.getElementById(prefix+'-suggestions').classList.remove('open');

  // Display coords + zone info (sync — no API call needed)
  const coordEl = document.getElementById(prefix+'-coords');
  if (coordEl) {
    // Show offset for today as preview (actual calc uses birth date)
    const today = new Date().toISOString().slice(0,10);
    const offsetLabel = fmtZoneOffset(ianaZone, today);
    coordEl.innerHTML = `${lat.toFixed(4)}, ${lng.toFixed(4)} · ${offsetLabel} <span class="tz-ok">✓ ${ianaZone}</span>`;
  }

  if (prefix === 'live') {
    // For live mode, compute numeric offset from ianaZone for display in time nav
    const today = new Date().toISOString().slice(0,10);
    const dt = DateTime.fromISO(`${today}T12:00`, { zone: ianaZone });
    const tzNum = dt.isValid ? dt.offset / 60 : Math.round(lng / 15);
    liveLocation = { lat, lng, tz: tzNum, ianaZone, name: label };
    updateTimeDisplay();
    if (swe) renderLiveChart();
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function degToSign(deg) {
  const d = ((deg % 360) + 360) % 360;
  const si = Math.floor(d / 30);
  const di = d - si * 30;
  return { sign: si, deg: Math.floor(di), min: Math.floor((di % 1) * 60), full: d };
}
function fmtShort(deg) {
  const { sign, deg: d, min } = degToSign(deg);
  return `${d}°${String(min).padStart(2,'0')}' ${SIGN_G[sign]}`;
}
function angleDiff(a, b) { let d = Math.abs(a - b) % 360; return d > 180 ? 360 - d : d; }

// Legacy numeric-offset JD (used by live/transits current-time path)
function getJD(year, month, day, hour, min, tzOffsetHours) {
  return swe.julday(year, month, day, hour + min / 60 - tzOffsetHours);
}

// IANA-aware JD: reads date/time from form fields + stored IANA zone → JD UTC
// Returns null on invalid input and shows a status error.
function getJDFromForm(dateInputId, hourInputId, minInputId, tzInputId) {
  const dateStr = document.getElementById(dateInputId)?.value;
  const hour    = +document.getElementById(hourInputId)?.value || 0;
  const min     = +document.getElementById(minInputId)?.value  || 0;
  const zone    = document.getElementById(tzInputId)?.value    || 'UTC';
  const jd = localToJD(dateStr, hour, min, zone);
  if (jd === null) showStatus('⚠ Data ou fuso inválido');
  return jd;
}
function parseDateInput(id) {
  const v = document.getElementById(id).value;
  if (!v) return null;
  const [y, m, d] = v.split('-').map(Number);
  return { y, m, d };
}
function calcPlanets(jd) {
  return PLANETS.map(p => {
    const pos = swe.calc_ut(jd, p.id, swe.SEFLG_SWIEPH | swe.SEFLG_SPEED);
    return { ...p, lon: pos[0], lat: pos[1], speed: pos[3], retro: pos[3] < 0 };
  });
}
function calcHouses(jd, lat, lng, sys) {
  try {
    const h = swe.houses(jd, lat, lng, sys);
    if (Array.isArray(h) && h.length >= 12) {
      return { cusps: h.slice(0, 12), asc: h[12] ?? h[0], mc: h[13] ?? h[9] };
    }
    if (h && h.cusps) return { cusps: h.cusps.slice(1, 13), asc: h.ascmc?.[0] ?? h.cusps[1], mc: h.ascmc?.[1] ?? h.cusps[10] };
  } catch(e) {}
  return null;
}
function getPlanetHouse(lon, cusps) {
  for (let i = 0; i < 12; i++) {
    const c = cusps[i], n = cusps[(i+1)%12];
    const inH = c <= n ? (lon >= c && lon < n) : (lon >= c || lon < n);
    if (inH) return i + 1;
  }
  return 1;
}
function calcAspects(p1, p2) {
  const list2 = p2 || p1;
  const syn = !!p2;
  const out = [];
  for (let i = 0; i < p1.length; i++) {
    for (let j = syn ? 0 : i+1; j < list2.length; j++) {
      if (!syn && i === j) continue;
      const diff = angleDiff(p1[i].lon, list2[j].lon);
      for (const asp of ASPECTS) {
        const orb = Math.abs(diff - asp.angle);
        if (orb <= asp.orb) { out.push({ p1: p1[i], p2: list2[j], type: asp, orb: orb.toFixed(1) }); break; }
      }
    }
  }
  return out.sort((a,b) => a.orb - b.orb);
}

// ── Live Chart ────────────────────────────────────────────────────────────────
function renderLiveChart() {
  if (!swe) return;
  const jd = swe.julday(navDate.getUTCFullYear(), navDate.getUTCMonth()+1, navDate.getUTCDate(),
    navDate.getUTCHours() + navDate.getUTCMinutes()/60);
  const planets = calcPlanets(jd);
  const houses  = calcHouses(jd, liveLocation.lat, liveLocation.lng, 'P');
  const aspects = calcAspects(planets);
  drawChart(planets, houses, aspects, null, null, 'live');
  renderPlanetList(planets, houses);
  renderHouseList(houses);
  renderAspectList(aspects);
}

window.calcLive = function() {
  if (!swe) return;
  const d = parseDateInput('live-date');
  if (!d) return;
  const hour     = +document.getElementById('live-hour').value;
  const min      = +document.getElementById('live-min').value;
  const lat      = +document.getElementById('live-lat').value;
  const lng      = +document.getElementById('live-lng').value;
  const ianaZone = document.getElementById('live-tz').value || 'America/Sao_Paulo';
  // Compute numeric offset for display in time nav (uses current/today date)
  const dateStr  = document.getElementById('live-date').value;
  const dt       = DateTime.fromISO(`${dateStr}T12:00`, { zone: ianaZone });
  const tzNum    = dt.isValid ? dt.offset / 60 : Math.round(lng / 15);
  liveLocation   = { lat, lng, tz: tzNum, ianaZone, name: document.getElementById('live-loc').value || liveLocation.name };
  navDate = new Date(d.y, d.m-1, d.d, hour, min);
  updateTimeDisplay();
  renderLiveChart();
  showStatus('Céu atualizado ✦');
};

// ── Natal ─────────────────────────────────────────────────────────────────────

  if (!swe) return;

  const lat  = +document.getElementById('n1-lat').value;

  // Update coords display with offset for the actual birth date

  const coordEl = document.getElementById('n1-coords');

    coordEl.innerHTML = `${lat.toFixed(4)}, ${lng.toFixed(4)} · ${offsetLabel} <span class="tz-ok">✓ ${zone}</span>`;

  renderHouseList(houses);
  renderAspectList(aspects);
  showStatus(`Mapa de ${name} ✦`);

// ── Synastry ──────────────────────────────────────────────────────────────────
window.calcSynastry = function() {
  if (!swe) return;
  const jd1 = getJDFromForm('s1-date', 's1-hour', 's1-min', 's1-tz');
  const jd2 = getJDFromForm('s2-date', 's2-hour', 's2-min', 's2-tz');
  if (jd1 === null || jd2 === null) return;
  const lat1 = +document.getElementById('s1-lat').value, lng1 = +document.getElementById('s1-lng').value;
  const lat2 = +document.getElementById('s2-lat').value, lng2 = +document.getElementById('s2-lng').value;
  const p1   = calcPlanets(jd1);
  const p2   = calcPlanets(jd2);
  const h1   = calcHouses(jd1, lat1, lng1, 'P');
  const h2   = calcHouses(jd2, lat2, lng2, 'P');
  const aspects = calcAspects(p1, p2);
  const n1 = document.getElementById('s1-name').value || 'A';
  const n2 = document.getElementById('s2-name').value || 'B';
  drawChart(p1, h1, aspects, n1, p2, 'synastry', h2);
  let score = 50;
  for (const a of aspects) {
    if (a.type.name==='Trígono') score+=5;
    else if (a.type.name==='Sextil') score+=3;
    else if (a.type.name==='Conjunção') score+=2;
    else if (a.type.name==='Quadratura') score-=2;
    else if (a.type.name==='Oposição') score-=1;
  }
  score = Math.max(20, Math.min(98, score));
  renderSynastryInfo(p1, p2, aspects, n1, n2, score);
  showStatus(`Sinastria ${n1} ✦ ${n2}`);
};

// ── Transits ──────────────────────────────────────────────────────────────────
window.calcTransits = function() {
  if (!swe) return;
  // Natal chart: uses IANA zone from stored tz field (birth location)
  const njd = getJDFromForm('t-ndate', 't-nhour', 't-nmin', 't-tz');
  if (njd === null) return;
  // Transit moment: uses manual numeric UTC offset (t-ttz) — user knows their current fuso
  const td = parseDateInput('t-date');
  if (!td) return;
  const ttz = +document.getElementById('t-ttz').value;
  const tjd = getJD(td.y, td.m, td.d, +document.getElementById('t-hour').value, 0, ttz);
  const natal   = calcPlanets(njd);
  const transit = calcPlanets(tjd);
  const houses  = calcHouses(njd, +document.getElementById('t-lat').value, +document.getElementById('t-lng').value, 'P');
  const aspects = calcAspects(transit, natal);
  const name    = document.getElementById('t-name').value || 'Pessoa';
  drawChart(natal, houses, aspects, name, transit, 'transits');
  renderTransitInfo(transit, aspects);
  showStatus(`Trânsitos sobre ${name} ✦`);
};

// ── DRAW CHART ────────────────────────────────────────────────────────────────
function drawChart(planets, houses, aspects, label, planets2, mode, houses2) {
  // Store for re-render
  _lastRender = [planets, houses, aspects, label, planets2, mode, houses2];

  // Rotate chart so ASC is at 9 o'clock for natal/synastry/transits.
  // Live mode keeps 0°Aries at left (no personal ASC reference).
  _ascOffset = (mode !== 'live' && houses?.asc != null) ? houses.asc : 0;
  const svg = document.getElementById('chart-svg');
  svg.innerHTML = '';
  svg.setAttribute('viewBox', '-300 -300 600 600');

  const ns = 'http://www.w3.org/2000/svg';
  const defs = document.createElementNS(ns, 'defs');
  defs.innerHTML = `<radialGradient id="cg" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#181410"/><stop offset="100%" stop-color="#0d0b08"/></radialGradient>`;
  svg.appendChild(defs);

  // Rings
  mkC(svg, 0,0,295, '#0d0b08', 'rgba(201,168,76,0.35)', 0.5);
  mkC(svg, 0,0,290, 'none', 'rgba(201,168,76,0.1)', 0.5);
  mkC(svg, 0,0,250, 'rgba(201,168,76,0.03)', 'rgba(201,168,76,0.28)', 0.5);
  mkC(svg, 0,0,195, 'rgba(13,11,8,0.65)', 'rgba(201,168,76,0.28)', 0.5);
  mkC(svg, 0,0,145, 'rgba(13,11,8,0.75)', 'rgba(201,168,76,0.18)', 0.5);
  mkC(svg, 0,0,95,  'url(#cg)', 'rgba(201,168,76,0.18)', 0.5);
  mkC(svg, 0,0,3,   'rgba(201,168,76,0.45)', 'none', 0);

  // Degree ticks (inside sign ring, r=195–250)
  if (ctrlState.degrees) {
    for (let i = 0; i < 360; i++) {
      const is10 = (i % 10 === 0);
      const is5  = (i % 5 === 0);
      const tickLen = is10 ? 7 : is5 ? 4.5 : 2.5;
      const rOut = 194;
      const rIn  = rOut - tickLen;
      const p1 = lon2xy(i, rOut), p2 = lon2xy(i, rIn);
      const col = is10 ? 'rgba(201,168,76,0.45)' : 'rgba(201,168,76,0.22)';
      mkL(svg, p1.x,p1.y,p2.x,p2.y, col, is10 ? 0.6 : 0.35, '');
    }
  }

  // Sign ring
  for (let i = 0; i < 12; i++) {
    const p1 = lon2xy(i*30, 195), p2 = lon2xy(i*30, 250);
    mkL(svg, p1.x,p1.y,p2.x,p2.y, 'rgba(201,168,76,0.28)', 0.5, '');
    const mid = lon2xy(i*30+15, 222);
    mkT(svg, SIGN_G[i], mid.x, mid.y, "'Noto Sans Symbols', serif", 13, SIGN_COL[i]);
  }

  // House cusps (Person 1 — outer ring r=98–192)
  if (houses?.cusps) {
    for (let i = 0; i < 12; i++) {
      const c = houses.cusps[i];
      const angular = [0,3,6,9].includes(i);
      const succedent = [1,4,7,10].includes(i);
      const col = angular ? 'rgba(201,168,76,0.65)' : succedent ? 'rgba(201,168,76,0.32)' : 'rgba(201,168,76,0.18)';
      const p1 = lon2xy(c,98), p2 = lon2xy(c,192);
      mkL(svg, p1.x,p1.y,p2.x,p2.y, col, angular?0.8:0.5, '');
      const mid = lon2xy(c+15, 168);
      mkT(svg, String(i+1), mid.x, mid.y, 'Cinzel,serif', 6.5, 'rgba(201,168,76,0.45)');
    }
    const ap = lon2xy(houses.asc, 186); mkT(svg,'ASC',ap.x,ap.y,'Cinzel,serif',6.5,'#c9a84c');
    const mp = lon2xy(houses.mc,  186); mkT(svg,'MC', mp.x,mp.y,'Cinzel,serif',6.5,'#c9a84c');
    // In natal mode ASC is always at left; add DSC label on the right
    if (mode !== 'live') {
      const dsc = ((houses.asc + 180) % 360);
      const dp = lon2xy(dsc, 186); mkT(svg,'DSC',dp.x,dp.y,'Cinzel,serif',6.5,'rgba(201,168,76,0.55)');
      const ic = ((houses.mc + 180) % 360);
      const ip = lon2xy(ic, 186); mkT(svg,'IC',ip.x,ip.y,'Cinzel,serif',6.5,'rgba(201,168,76,0.55)');
    }
  }

  // ── Synastry: Person 2 inner house ring (r=98–145) ────────────────────────
  // Rendered as a subtle inner ring in rose/magenta tones, distinct from Person 1's gold ring
  if (mode === 'synastry' && houses2?.cusps) {
    // Inner ring border
    mkC(svg, 0,0,98, 'none', 'rgba(236,64,122,0.35)', 0.5);
    // Use a separate ASC offset for Person 2 cusps — they live in the same coordinate space
    // since the chart rotates by Person 1's ASC. We draw Person 2 cusps as-is.
    const romaP2 = ['I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII'];
    for (let i = 0; i < 12; i++) {
      const c = houses2.cusps[i];
      const angular2 = [0,3,6,9].includes(i);
      const col2 = angular2 ? 'rgba(236,64,122,0.55)' : 'rgba(236,64,122,0.22)';
      const sw2 = angular2 ? 0.7 : 0.4;
      // Cuspide line: inside inner ring only (r=50 to r=96)
      const p1 = lon2xy(c, 50), p2 = lon2xy(c, 96);
      mkL(svg, p1.x,p1.y,p2.x,p2.y, col2, sw2, angular2 ? '' : '2 2');
      // House number at midpoint of house (inner ring midpoint ~r=72)
      // Midpoint = average between this cusp and next cusp
      const nextC = houses2.cusps[(i+1)%12];
      let mid = c + angleDiff(c, nextC) / 2;
      if (nextC < c && !((nextC + 360 - c) < 180)) mid = c - angleDiff(c, nextC)/2;
      // Simpler: just offset 15° into the house
      const midLon = (c + 15) % 360;
      const mPos = lon2xy(midLon, 72);
      mkT(svg, romaP2[i], mPos.x, mPos.y, 'Cinzel,serif', 5.5, 'rgba(236,64,122,0.6)');
    }
    // ASC2 / MC2 labels just inside inner ring
    const asc2 = houses2.asc;
    const mc2  = houses2.mc;
    const ap2 = lon2xy(asc2, 90); mkT(svg,'A₂',ap2.x,ap2.y,'Cinzel,serif',5.5,'rgba(236,64,122,0.75)');
    const mp2 = lon2xy(mc2,  90); mkT(svg,'M₂',mp2.x,mp2.y,'Cinzel,serif',5.5,'rgba(236,64,122,0.75)');
  }

  // Aspect lines
  const r1 = mode==='synastry' ? 130 : (mode==='transits' ? 110 : 93);
  const r2 = mode==='synastry' ? 95  : (mode==='transits' ? 93  : 93);
  for (const a of aspects) {
    const lon1 = a.p1.lon, lon2 = a.p2.lon;
    const ra = mode==='transits' ? 148 : r1;
    const rb = mode==='transits' ? 110 : r2;
    const isP2 = planets2 && planets2.some(p=>p.name===a.p1.name);
    const pa = lon2xy(lon1, isP2 ? rb : ra);
    const pb = lon2xy(lon2, isP2 ? ra : rb);
    const opacity = Math.max(0.1, 0.5 - a.orb*0.04);
    const line = mkL(svg, pa.x,pa.y,pb.x,pb.y, a.type.color, 0.4, a.type.dash);
    line.setAttribute('opacity', opacity);
    // Tag aspect lines with planet names for hover highlight
    line.dataset.asp = `${a.p1.name}|${a.p2.name}`;
    line.classList.add('asp-line');
  }

  // Planets
  const pr = mode==='synastry' ? 165 : (mode==='transits' ? 130 : 163);
  drawPlanetSymbols(svg, planets, houses, aspects, pr, '#c9a84c', false, mode, planets2);

  if (planets2) {
    const pr2 = mode==='synastry' ? 116 : 163;
    const col2 = mode==='synastry' ? '#ec407a' : '#80cbc4';
    drawPlanetSymbols(svg, planets2, null, aspects, pr2, col2, mode==='synastry', mode, planets);
  }

  // Chart label
  if (label) mkT(svg, label, 0, -278, 'Cinzel,serif', 8, '#8a6b28');

  // Mode indicator
  const modeLabels = { live:'Céu ao Vivo', natal:'Mapa Natal', synastry:'Sinastria', transits:'Trânsitos' };
  mkT(svg, modeLabels[mode]||'', 0, 280, 'Cinzel,serif', 6.5, 'rgba(201,168,76,0.3)');

  // Synastry legend
  if (mode==='synastry' && planets2 && label) {
    const n2 = document.getElementById('s2-name')?.value || 'B';
    mkT(svg, `✦ ${label}`,  -240,-282,'Cinzel,serif',7,'#c9a84c');
    mkT(svg, `✦ ${n2}`,     -240,-270,'Cinzel,serif',7,'#ec407a');
  }
  if (mode==='transits' && planets2) {
    mkT(svg, `— natal`,  -240,-282,'Cinzel,serif',7,'#c9a84c');
    mkT(svg, `— trânsito`, -240,-270,'Cinzel,serif',7,'#80cbc4');
  }
}

function drawPlanetSymbols(svg, planets, houses, aspects, r, defCol, small, mode, otherPlanets) {
  const sorted = [...planets].sort((a,b) => a.lon-b.lon);
  const placed = [];
  const MIN_SEP = small ? 7 : 9;

  for (const planet of sorted) {
    let dLon = planet.lon;
    for (let tries=0; tries<24; tries++) {
      if (!placed.some(p => angleDiff(p, dLon) < MIN_SEP)) break;
      dLon += 5;
    }
    placed.push(dLon);

    const pos  = lon2xy(dLon, r);
    const aPos = lon2xy(planet.lon, r - (small?14:18));

    if (angleDiff(dLon, planet.lon) > 2.5) {
      mkL(svg, pos.x,pos.y,aPos.x,aPos.y, 'rgba(201,168,76,0.22)', 0.4, '');
      mkC(svg, aPos.x,aPos.y, 1.5, planet.color||defCol, 'none', 0);
    }

    const sz = small ? 8 : 10;
    const bg = mkC(svg, pos.x,pos.y, sz, 'rgba(13,11,8,0.82)', planet.color||defCol, 0.55);
    const glyph = mkT(svg, planet.glyph, pos.x, pos.y, 'serif', small?10:12, planet.color||defCol);

    // Invisible larger hit area for easier hover
    const hitR = small ? 11 : 13;
    const hit = mkC(svg, pos.x,pos.y, hitR, 'transparent', 'none', 0);
    hit.style.cursor = 'pointer';
    hit.dataset.planetName = planet.name;

    // Hover interactions
    hit.addEventListener('mouseenter', (e) => {
      onPlanetHover(e, planet, planets, houses, aspects, otherPlanets, pos);
      // Pulse the bg circle
      bg.setAttribute('r', sz + 2);
      bg.setAttribute('stroke-width', 1.2);
    });
    hit.addEventListener('mousemove', onTooltipMove);
    hit.addEventListener('mouseleave', () => {
      onPlanetLeave(planet.name);
      bg.setAttribute('r', sz);
      bg.setAttribute('stroke-width', 0.55);
    });

    if (planet.retro && planet.id > 1) {
      mkT(svg, '℞', pos.x+(small?6:8), pos.y-(small?5:6), 'serif', 5, '#c0392b');
    }
  }
}

// ── Planet hover handlers ─────────────────────────────────────────────────────
function onPlanetHover(e, planet, allPlanets, houses, aspects, otherPlanets, pos) {
  // Tooltip
  if (ctrlState.tooltip) {
    const tt = document.getElementById('planet-tooltip');
    const house = houses ? getPlanetHouse(planet.lon, houses.cusps) : null;
    document.getElementById('tt-name').textContent = planet.name + (planet.retro && planet.id > 1 ? ' ℞' : '');
    document.getElementById('tt-name').style.color = planet.color;
    document.getElementById('tt-pos').textContent  = fmtShort(planet.lon);
    document.getElementById('tt-house').textContent = house ? `Casa ${house}` : '';

    // Related aspects
    const related = aspects.filter(a => a.p1.name === planet.name || a.p2.name === planet.name);
    const aspEl = document.getElementById('tt-asp');
    if (related.length) {
      aspEl.innerHTML = related.slice(0,6).map(a => {
        const other = a.p1.name === planet.name ? a.p2 : a.p1;
        return `<div class="tt-asp-row" style="color:${a.type.color}">` +
          `<span style="color:${other.color}">${other.glyph}</span> ` +
          `${a.type.name.substring(0,6)} <span style="color:var(--gold-dim)">${a.orb}°</span></div>`;
      }).join('');
    } else {
      aspEl.innerHTML = '';
    }

    tt.style.display = 'block';
    positionTooltip(e);
  }

  // Highlight aspects in SVG
  if (ctrlState.tooltip) {
    const svg = document.getElementById('chart-svg');
    svg.querySelectorAll('.asp-line').forEach(line => {
      const [n1, n2] = (line.dataset.asp || '').split('|');
      const related = n1 === planet.name || n2 === planet.name;
      line.setAttribute('opacity', related ? '0.9' : '0.08');
      if (related) { line.setAttribute('stroke-width', 1.2); }
    });
  }

  // Highlight panel rows
  if (ctrlState.highlight) {
    highlightPanelForPlanet(planet.name);
  }
}

function onPlanetLeave(planetName) {
  document.getElementById('planet-tooltip').style.display = 'none';
  // Restore aspect lines
  const svg = document.getElementById('chart-svg');
  if (_lastRender) {
    const aspects = _lastRender[2];
    svg.querySelectorAll('.asp-line').forEach(line => {
      const asp = aspects.find(a => `${a.p1.name}|${a.p2.name}` === line.dataset.asp);
      if (asp) {
        const opacity = Math.max(0.1, 0.5 - asp.orb * 0.04);
        line.setAttribute('opacity', opacity);
        line.setAttribute('stroke-width', 0.4);
      }
    });
  }
  // Remove panel highlights
  document.querySelectorAll('.aspect-row.highlighted, .aspect-row.dimmed').forEach(el => {
    el.classList.remove('highlighted','dimmed');
  });
  document.querySelectorAll('.planet-row.highlighted').forEach(el => el.classList.remove('highlighted'));
}

function onTooltipMove(e) {
  if (ctrlState.tooltip) positionTooltip(e);
}

function positionTooltip(e) {
  const tt = document.getElementById('planet-tooltip');
  const margin = 14;
  let x = e.clientX + margin;
  let y = e.clientY + margin;
  const rect = tt.getBoundingClientRect();
  if (x + 160 > window.innerWidth)  x = e.clientX - 160 - margin;
  if (y + rect.height > window.innerHeight) y = e.clientY - rect.height - margin;
  tt.style.left = x + 'px';
  tt.style.top  = y + 'px';
}

function highlightPanelForPlanet(name) {
  // Highlight planet row
  document.querySelectorAll('.planet-row').forEach(row => {
    const pname = row.querySelector('.pn')?.textContent?.trim().replace(' ℞','');
    row.classList.toggle('highlighted', pname === name);
  });
  // Highlight/dim aspect rows
  document.querySelectorAll('.aspect-row').forEach(row => {
    const planets = (row.dataset.planets || '').split('|');
    const isRelated = planets.includes(name);
    row.classList.toggle('highlighted', isRelated);
    row.classList.toggle('dimmed', !isRelated);
  });
}

// ── SVG helpers ───────────────────────────────────────────────────────────────
const NS = 'http://www.w3.org/2000/svg';
function mkT(svg, text, x, y, font, size, fill, anchor='middle') {
  const el = document.createElementNS(NS,'text');
  el.setAttribute('x',x); el.setAttribute('y',y);
  el.setAttribute('font-family',font); el.setAttribute('font-size',size);
  el.setAttribute('fill',fill); el.setAttribute('text-anchor',anchor);
  el.setAttribute('dominant-baseline','central');
  el.textContent = text;
  svg.appendChild(el); return el;
}
function mkC(svg, cx, cy, r, fill, stroke, sw) {
  const el = document.createElementNS(NS,'circle');
  el.setAttribute('cx',cx); el.setAttribute('cy',cy); el.setAttribute('r',r);
  if (fill)   el.setAttribute('fill', fill);
  if (stroke) { el.setAttribute('stroke',stroke); el.setAttribute('stroke-width',sw); }
  svg.appendChild(el); return el;
}
function mkL(svg, x1,y1,x2,y2, stroke, sw, dash) {
  const el = document.createElementNS(NS,'line');
  el.setAttribute('x1',x1);el.setAttribute('y1',y1);el.setAttribute('x2',x2);el.setAttribute('y2',y2);
  el.setAttribute('stroke',stroke); el.setAttribute('stroke-width',sw||0.5);
  if (dash) el.setAttribute('stroke-dasharray',dash);
  svg.appendChild(el); return el;
}
// ascOffset: subtract ASC longitude so ASC lands at 9 o'clock (left).
// In natal/synastry/transits modes this is set to houses.asc.
// In live mode (no natal reference) it stays 0 → 0°Aries at left.
let _ascOffset = 0;

function lon2xy(lon, r) {
  const rad = (180 - (lon - _ascOffset)) * Math.PI / 180;
  return { x: r * Math.cos(rad), y: r * Math.sin(rad) };
}

// ── Info Panel Renderers ──────────────────────────────────────────────────────
function renderPlanetList(planets, houses) {
  const el = document.getElementById('planet-list');
  el.innerHTML = '';
  for (const p of planets) {
    const house = houses ? getPlanetHouse(p.lon, houses.cusps) : '—';
    const row = document.createElement('div');
    row.className = 'planet-row';
    row.innerHTML = `
      <span class="pg" style="color:${p.color}">${p.glyph}</span>
      <span class="pn">${p.name}</span>
      <span class="pp">${fmtShort(p.lon)}${p.retro&&p.id>1?'<span class="pr"> ℞</span>':''}</span>
      <span class="ph">Casa ${house}</span>`;
    el.appendChild(row);
  }
}

function renderHouseList(houses) {
  const el = document.getElementById('house-list');
  el.innerHTML = '';
  if (!houses) { el.innerHTML='<div class="empty">—</div>'; return; }
  const L = ['I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII'];
  for (let i=0; i<12; i++) {
    const { sign, deg, min } = degToSign(houses.cusps[i]);
    const row = document.createElement('div');
    row.className = 'house-row';
    row.innerHTML = `<span class="hn">${L[i]}</span><span class="hc">${deg}°${String(min).padStart(2,'0')}'</span><span class="hs">${SIGN_G[sign]} ${SIGNS[sign]}</span>`;
    el.appendChild(row);
  }
}

function renderAspectList(aspects) {
  const el = document.getElementById('aspect-list');
  el.innerHTML = '';
  if (!aspects.length) { el.innerHTML='<div class="empty">Nenhum aspecto</div>'; return; }
  for (const a of aspects.slice(0,28)) {
    const row = document.createElement('div');
    row.className = 'aspect-row';
    row.dataset.planets = `${a.p1.name}|${a.p2.name}`;
    row.innerHTML = `
      <span style="color:${a.p1.color};font-size:1rem">${a.p1.glyph}</span>
      <span style="color:${a.type.color};font-size:0.75rem;font-style:italic">${a.type.name.substring(0,6)}</span>
      <span style="color:${a.p2.color};font-size:1rem">${a.p2.glyph}</span>
      <span class="asp-orb">${a.orb}°</span>`;
    el.appendChild(row);
  }
}

function renderSynastryInfo(p1, p2, aspects, name1, name2, score) {
  document.getElementById('planet-list').innerHTML = `
    <div class="compat-score">
      <div class="compat-num">${Math.round(score)}</div>
      <div class="compat-lbl">índice de ressonância</div>
    </div>
    <div style="font-size:0.78rem;color:var(--text-faint);font-style:italic;line-height:1.55;margin-bottom:0.8rem">
      ${aspects.length} aspectos entre ${name1} e ${name2}. ${score>70?'Alta harmonia sinérgica.':score>50?'Dinâmica equilibrada.':'Tensão criativa presente.'}
    </div>`;
  renderAspectList(aspects);
  document.getElementById('house-list').innerHTML='<div class="empty" style="font-size:0.72rem">Use o tab Natal para ver casas individuais</div>';
}

function renderTransitInfo(transit, aspects) {
  const el = document.getElementById('planet-list');
  el.innerHTML = '';
  for (const p of transit) {
    const row = document.createElement('div');
    row.className = 'planet-row';
    row.innerHTML = `
      <span class="pg" style="color:${p.color}">${p.glyph}</span>
      <span class="pn">${p.name}${p.retro&&p.id>1?'<span class="pr"> ℞</span>':''}</span>
      <span class="pp" style="color:#80cbc4">${fmtShort(p.lon)}</span>
      <span class="ph">transit</span>`;
    el.appendChild(row);
  }
  document.getElementById('house-list').innerHTML='<div class="empty" style="font-size:0.72rem">—</div>';
  renderAspectList(aspects);
}

// ═══════════════════════════════════════════════════════════════════════════════

function isMobile() { return window.innerWidth <= 767; }

const FORM_TITLES = { live:'Céu ao Vivo', natal:'Mapa Natal', synastry:'Sinastria', transits:'Trânsitos' };

function placeFormsInSidebar() {
  const sidebar = document.getElementById('sidebar');
  ['live','natal','synastry','transits'].forEach(tab => {
    const el = document.getElementById('tab-' + tab);
    if (el && el.parentElement !== sidebar) sidebar.appendChild(el);
    el.style.display = '';
  });
}

function placeFormInSheet(tab) {
  const body = document.getElementById('mob-form-body');
  const el = document.getElementById('tab-' + tab);
  if (!el) return;
  if (el.parentElement !== body) { body.innerHTML = ''; body.appendChild(el); }
  el.style.display = 'block';
  document.getElementById('mob-form-title').textContent = FORM_TITLES[tab] || tab;
}

function returnFormToHost(tab) {
  const host = document.getElementById('forms-host');
  const el = document.getElementById('tab-' + tab);
  if (el && el.parentElement !== host) { host.appendChild(el); el.style.display = ''; }
}

function initFormPlacement() {
  if (!isMobile()) {
    placeFormsInSidebar();
    document.getElementById('tab-live').classList.add('active');
  }
}

// ── switchTab: desktop only ───────────────────────────────────────────────────
window.switchTab = function(tab) {
  currentTab = tab;
  ['live','natal','synastry','transits'].forEach((t, i) => {
    const btn = document.querySelectorAll('.tab-btn')[i];
    if (btn) btn.classList.toggle('active', t === tab);
    if (!isMobile()) {
      const el = document.getElementById('tab-' + t);
      if (el) el.classList.toggle('active', t === tab);
    }
  });
};

// ── goNow: always render live ─────────────────────────────────────────────────
window.goNow = function() {
  navDate = new Date();
  currentTab = 'live';
  updateTimeDisplay();
  syncDateFields();
  renderLiveChart();
  if (isMobile()) {
    closeMobSheets();
    ['live','natal','synastry','transits'].forEach(t => {
      const btn = document.getElementById('mbb-' + t);
      if (btn) btn.classList.toggle('active', t === 'live');
    });
    showStatus('Céu ao Vivo ✦');
  } else {
    switchTab('live');
  }
};

// ── mobSwitchTab: mobile bottom bar ──────────────────────────────────────────
window.mobSwitchTab = function(tab) {
  ['live','natal','synastry','transits'].forEach(t => {
    const btn = document.getElementById('mbb-' + t);
    if (btn) btn.classList.toggle('active', t === tab);
  });
  if (tab === 'live') {
    closeMobSheets();
    currentTab = 'live';
    renderLiveChart();
    showStatus('Céu ao Vivo ✦');
  } else {
    openMobFormSheet(tab);
  }
};

// ── Mobile panels ─────────────────────────────────────────────────────────────
let _currentMobTab = null;

window.openMobFormSheet = function(tab) {
  if (!isMobile()) return;
  currentTab = tab;
  _currentMobTab = tab;
  document.getElementById('mob-form-reset').style.display = tab === 'live' ? 'none' : '';
  placeFormInSheet(tab);
  document.getElementById('mob-info-sheet').classList.remove('open');
  document.getElementById('mob-settings-tray').classList.remove('open');
  document.getElementById('mob-form-sheet').classList.add('open');
  document.getElementById('panel-overlay').classList.add('visible');
};

window.closeMobSheet = function(which) {
  if (which === 'form') {
    document.getElementById('mob-form-sheet').classList.remove('open');
    if (_currentMobTab) returnFormToHost(_currentMobTab);
  } else {
    document.getElementById('mob-info-sheet').classList.remove('open');
  }
  const formOpen = document.getElementById('mob-form-sheet').classList.contains('open');
  const infoOpen = document.getElementById('mob-info-sheet').classList.contains('open');
  if (!formOpen && !infoOpen) document.getElementById('panel-overlay').classList.remove('visible');
};

window.closeMobSheets = function() {
  if (_currentMobTab) returnFormToHost(_currentMobTab);
  document.getElementById('mob-form-sheet').classList.remove('open');
  document.getElementById('mob-info-sheet').classList.remove('open');
  document.getElementById('mob-settings-tray').classList.remove('open');
  document.getElementById('panel-overlay').classList.remove('visible');
};

window.closeAllPanels = function() {
  if (isMobile()) { closeMobSheets(); return; }
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('info-panel').classList.remove('open');
  document.getElementById('panel-overlay').classList.remove('visible');
};

const FORM_DEFAULTS = {
  natal:    { 'n1-name':'Pessoa','n1-loc':'','n1-lat':'-19.92','n1-lng':'-43.94','n1-tz':'America/Sao_Paulo','n1-date':'1990-01-01','n1-hour':'12','n1-min':'0','n1-coords':'','n1-house':'P' },
  synastry: { 's1-name':'Pessoa A','s1-loc':'','s1-lat':'-19.92','s1-lng':'-43.94','s1-tz':'America/Sao_Paulo','s1-date':'1990-01-01','s1-hour':'12','s1-min':'0','s1-coords':'','s2-name':'Pessoa B','s2-loc':'','s2-lat':'-23.55','s2-lng':'-46.63','s2-tz':'America/Sao_Paulo','s2-date':'1992-06-15','s2-hour':'9','s2-min':'30','s2-coords':'' },
  transits: { 't-name':'Pessoa','t-loc':'','t-lat':'-19.92','t-lng':'-43.94','t-tz':'America/Sao_Paulo','t-ndate':'1990-01-01','t-nhour':'12','t-nmin':'0','t-coords':'','t-hour':'12','t-ttz':'-3' },
};

window.resetMobForm = function() {
  if (!_currentMobTab || !FORM_DEFAULTS[_currentMobTab]) return;
  Object.entries(FORM_DEFAULTS[_currentMobTab]).forEach(([id, val]) => {
    const el = document.getElementById(id);
    if (!el) return;
    if (id.endsWith('-coords')) { el.innerHTML = ''; return; }
    el.value = val;
  });
  showStatus('Formulário limpo ↺');
};

window.openMobInfoSheet = function() {
  if (!isMobile()) return;
  const sync = (s,d) => { const se=document.getElementById(s),de=document.getElementById(d); if(se&&de) de.innerHTML=se.innerHTML; };
  sync('planet-list','mob-planet-list'); sync('house-list','mob-house-list'); sync('aspect-list','mob-aspect-list');
  if (_currentMobTab) returnFormToHost(_currentMobTab);
  document.getElementById('mob-form-sheet').classList.remove('open');
  document.getElementById('mob-settings-tray').classList.remove('open');
  document.getElementById('mob-info-sheet').classList.add('open');
  document.getElementById('panel-overlay').classList.add('visible');
};

window.toggleSettingsTray = function() {
  const tray = document.getElementById('mob-settings-tray');
  const isOpen = tray.classList.contains('open');
  if (_currentMobTab) returnFormToHost(_currentMobTab);
  document.getElementById('mob-form-sheet').classList.remove('open');
  document.getElementById('mob-info-sheet').classList.remove('open');
  document.getElementById('panel-overlay').classList.remove('visible');
  tray.classList.toggle('open', !isOpen);
};

const _origToggleCtrl = window.toggleCtrl;
window.toggleCtrl = function(key) {
  _origToggleCtrl(key);
  const trayBtn = document.getElementById('tray-' + key);
  if (trayBtn) trayBtn.classList.toggle('on', ctrlState[key]);
};

function mobAfterCalc() {
  if (!isMobile()) return;
  closeMobSheets();
  setTimeout(() => {
    const sync = (s,d) => { const se=document.getElementById(s),de=document.getElementById(d); if(se&&de) de.innerHTML=se.innerHTML; };
    sync('planet-list','mob-planet-list'); sync('house-list','mob-house-list'); sync('aspect-list','mob-aspect-list');
  }, 150);
}

;['calcLive','calcNatal','calcSynastry','calcTransits'].forEach(fn => {
  const orig = window[fn];
  window[fn] = function(...args) { const r=orig.apply(this,args); mobAfterCalc(); return r; };
});

// ── Mobile planet tooltip (tap + drag) ────────────────────────────────────────
let _activeMobPlanetName = null;
let _ttDrag = { active:false, startX:0, startY:0, origX:0, origY:0 };

window.showMobPlanetTooltip = function(planet, houses, aspects, svgBBox) {
  if (!isMobile() || !ctrlState.tooltip) return;
  if (_activeMobPlanetName === planet.name) { closeMobPlanetTooltip(); return; }
  _activeMobPlanetName = planet.name;

  const tt = document.getElementById('mob-planet-tooltip');
  document.getElementById('mpt-name').textContent = planet.name + (planet.retro&&planet.id>1?' ℞':'');
  document.getElementById('mpt-name').style.color = planet.color;
  document.getElementById('mpt-pos').textContent  = fmtShort(planet.lon);
  const house = houses ? getPlanetHouse(planet.lon, houses.cusps) : null;
  document.getElementById('mpt-house').textContent = house ? 'Casa '+house : '';

  const related = aspects.filter(a=>a.p1.name===planet.name||a.p2.name===planet.name);
  document.getElementById('mpt-asps').innerHTML = related.slice(0,6).map(a => {
    const o = a.p1.name===planet.name ? a.p2 : a.p1;
    return `<div class="mpt-asp-row" style="color:${a.type.color}"><span style="color:${o.color}">${o.glyph}</span> ${a.type.name.substring(0,6)} <span style="color:var(--gold-dim)">${a.orb}°</span></div>`;
  }).join('');

  tt.classList.add('visible');
  requestAnimationFrame(() => {
    const ttW=Math.min(tt.offsetWidth||200,260), ttH=tt.offsetHeight||120, m=12;
    const cr=document.getElementById('chart-area').getBoundingClientRect();
    let x=(svgBBox.x+svgBBox.width/2)-ttW/2, y=svgBBox.y-ttH-m;
    x=Math.max(cr.left+8,Math.min(x,cr.right-ttW-8));
    if(y<cr.top+8) y=svgBBox.y+svgBBox.height+m;
    if(y+ttH>window.innerHeight-56-8) y=svgBBox.y-ttH-m;
    tt.style.left=x+'px'; tt.style.top=y+'px';
  });

  if (ctrlState.tooltip) {
    document.getElementById('chart-svg').querySelectorAll('.asp-line').forEach(line => {
      const [n1,n2]=(line.dataset.asp||'').split('|');
      const rel=n1===planet.name||n2===planet.name;
      line.setAttribute('opacity',rel?'0.9':'0.08');
      if(rel) line.setAttribute('stroke-width','1.2');
    });
  }
  if (ctrlState.highlight) highlightPanelForPlanet(planet.name);
};

window.closeMobPlanetTooltip = function() {
  _activeMobPlanetName = null;
  document.getElementById('mob-planet-tooltip').classList.remove('visible');
  onPlanetLeave('__none__');
};

const _mobTT = document.getElementById('mob-planet-tooltip');
_mobTT.addEventListener('touchstart', function(e) {
  if(e.touches.length!==1) return;
  const t=e.touches[0], r=_mobTT.getBoundingClientRect();
  _ttDrag={active:true,startX:t.clientX,startY:t.clientY,origX:r.left,origY:r.top};
  e.stopPropagation();
},{passive:true});
_mobTT.addEventListener('touchmove', function(e) {
  if(!_ttDrag.active||e.touches.length!==1) return;
  e.preventDefault();
  const t=e.touches[0];
  const nx=Math.max(8,Math.min(_ttDrag.origX+(t.clientX-_ttDrag.startX),window.innerWidth-_mobTT.offsetWidth-8));
  const ny=Math.max(8,Math.min(_ttDrag.origY+(t.clientY-_ttDrag.startY),window.innerHeight-56-_mobTT.offsetHeight-8));
  _mobTT.style.left=nx+'px'; _mobTT.style.top=ny+'px';
},{passive:false});
_mobTT.addEventListener('touchend',()=>{ _ttDrag.active=false; },{passive:true});

document.addEventListener('touchstart', function(e) {
  if(!isMobile()) return;
  const tt=document.getElementById('mob-planet-tooltip');
  if(!tt.classList.contains('visible')) return;
  if(!tt.contains(e.target)&&!e.target.dataset.planetName) closeMobPlanetTooltip();
},{passive:true});

// ── SVG touch: pinch-zoom + pan + planet tap ──────────────────────────────────
let _zoomState={scale:1,tx:0,ty:0}, _lastTouches=null, _isPinching=false, _panStart=null;

function applyZoomTransform() {
  const w=document.getElementById('chart-zoom-wrap'), {scale,tx,ty}=_zoomState;
  w.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
  w.style.transformOrigin='50% 50%';
  document.getElementById('btn-zoom-reset').classList.toggle('visible',scale!==1||tx!==0||ty!==0);
}

window.resetZoom = function() {
  _zoomState={scale:1,tx:0,ty:0};
  const w=document.getElementById('chart-zoom-wrap');
  w.style.transition='transform 0.3s ease'; applyZoomTransform();
  setTimeout(()=>{ w.style.transition=''; },320);
};

function _tmid(t1,t2){return{x:(t1.clientX+t2.clientX)/2,y:(t1.clientY+t2.clientY)/2};}
function _tdist(t1,t2){const dx=t1.clientX-t2.clientX,dy=t1.clientY-t2.clientY;return Math.sqrt(dx*dx+dy*dy);}

const svgEl=document.getElementById('chart-svg');

svgEl.addEventListener('touchstart',function(e){
  if(!isMobile()) return;
  if(e.touches.length===1){
    const touch=e.touches[0], target=document.elementFromPoint(touch.clientX,touch.clientY);
    if(target&&target.dataset.planetName&&_lastRender){
      e.preventDefault();
      const [planets,houses,aspects]=_lastRender;
      const all=[...(planets||[]),...(_lastRender[4]||[])];
      const planet=all.find(p=>p.name===target.dataset.planetName);
      if(planet){ const bbox=target.getBoundingClientRect(); showMobPlanetTooltip(planet,houses,aspects,bbox); }
      return;
    }
    _panStart={x:touch.clientX-_zoomState.tx,y:touch.clientY-_zoomState.ty}; _isPinching=false;
  } else if(e.touches.length===2){
    e.preventDefault(); _isPinching=true; _panStart=null;
    _lastTouches={dist:_tdist(e.touches[0],e.touches[1]),mid:_tmid(e.touches[0],e.touches[1]),scale:_zoomState.scale,tx:_zoomState.tx,ty:_zoomState.ty};
  }
},{passive:false});

svgEl.addEventListener('touchmove',function(e){
  if(!isMobile()) return;
  if(e.touches.length===2&&_lastTouches){
    e.preventDefault();
    const ns=Math.max(0.8,Math.min(5,_lastTouches.scale*(_tdist(e.touches[0],e.touches[1])/_lastTouches.dist)));
    const m=_tmid(e.touches[0],e.touches[1]);
    _zoomState.scale=ns; _zoomState.tx=_lastTouches.tx+(m.x-_lastTouches.mid.x); _zoomState.ty=_lastTouches.ty+(m.y-_lastTouches.mid.y);
    applyZoomTransform();
  } else if(e.touches.length===1&&_panStart&&!_isPinching&&_zoomState.scale>1){
    e.preventDefault();
    const t=e.touches[0]; _zoomState.tx=t.clientX-_panStart.x; _zoomState.ty=t.clientY-_panStart.y;
    applyZoomTransform();
  }
},{passive:false});

svgEl.addEventListener('touchend',function(e){
  if(!isMobile()) return;
  if(e.touches.length<2){_isPinching=false;_lastTouches=null;}
  if(e.touches.length===0) _panStart=null;
},{passive:true});

// ── Bootstrap ─────────────────────────────────────────────────────────────────
initFormPlacement();

</script>
